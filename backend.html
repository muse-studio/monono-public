<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"/>
  <title>新規登録 | 橋田Lab.　備品貸し出し管理</title>
  <link rel="icon" type="image/png" href="/monono-public/static/monono_favicon.png">
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <style>
    :root{ --fg:#1f2937; --muted:#6b7280; --line:#e5e7eb; --accent:#8bc56c; --ok:#10b981; }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;color:var(--fg);background:#fff}
    header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);padding:10px 16px;z-index:5}
    main{max-width:760px;margin:20px auto;padding:0 16px 24px}
    .btn{appearance:none;border:1px solid var(--line);background:#fff;padding:8px 12px;border-radius:10px;font-size:14px;cursor:pointer}
    .btn:hover{background:#f9fafb}
    .btn-pri{border-color:transparent;background:var(--accent);color:#fff}
    .btn-pri[disabled]{opacity:.5;cursor:not-allowed}
    .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
    input,select{padding:10px;border:1px solid var(--line);border-radius:10px;width:100%}
    label{font-size:14px}
    .muted{color:var(--muted);font-size:12px}
    .card{border:1px solid var(--line);border-radius:14px;padding:16px;background:#fff;margin-top:12px}
    .bar{height:8px;border-radius:999px;background:#f3f4f6;overflow:hidden}
    .bar span{display:block;height:100%;width:0%;transition:width .25s ease}
    .bar.weak span{background:#ef4444}
    .bar.fair span{background:#f59e0b}
    .bar.good span{background:#10b981}
    .tips{margin:6px 0 0;font-size:12px;color:var(--muted)}
    details{background:#fafafa;border:1px solid #eee;border-radius:10px;padding:10px}
    details[open]{background:#fdf2f8}
  </style>
</head>
<body>
  <header>
    <div style="display:flex;gap:10px;align-items:center;justify-content:space-between">
      <div style="font-weight:700">新規登録</div>
      <div>
        <a class="btn" id="linkBackToLogin" href="/monono-public/index.html">← ログインへ戻る</a>
      </div>
    </div>
  </header>

  <main>
    <div class="card">
      <form id="regForm" onsubmit="return false;">
        <div class="row">
          <div style="flex:1 1 260px"><label class="muted">学校メール</label><input id="regEmail" placeholder="you@example.ac.jp" required></div>
          <div style="flex:1 1 220px"><label class="muted">学籍番号</label><input id="regSID" placeholder="e.g., A1B23456" required></div>
        </div>
        <div class="row">
          <div style="flex:1 1 140px"><label class="muted">姓</label><input id="regLast" required></div>
          <div style="flex:1 1 140px"><label class="muted">名</label><input id="regFirst" required></div>
          <div style="flex:1 1 180px"><label class="muted">生年月日</label><input id="regDOB" type="date"></div>
          <div style="flex:1 1 180px">
            <label class="muted">学年</label>
            <select id="regGrade">
              <option value="">選択なし</option>
              <option>B1</option><option>B2</option><option>B3</option><option>B4</option>
              <option>M1</option><option>M2</option><option>Doctor</option><option>Professor</option><option>Other</option>
            </select>
          </div>
        </div>

        <!-- パスワード強度 -->
        <div class="row">
          <div style="flex:1 1 320px">
            <label class="muted">パスワード（8文字以上）</label>
            <input id="regPass" type="password" minlength="8" placeholder="安全なパスワード" required>
            <div class="bar weak" id="pwBar"><span></span></div>
            <div class="tips" id="pwTips">英大文字・小文字・数字・記号を混ぜ，辞書語や学籍番号は避けてください．</div>
          </div>
        </div>

        <!-- 規約同意 -->
        <div class="card" style="margin-top:10px">
          <label style="display:flex;gap:10px;align-items:flex-start">
            <input type="checkbox" id="termsCheck">
            <span>
              <strong>利用規約に同意します</strong><br>
              <span class="muted">下記の利用規約をご確認の上、同意にチェックすると登録できます。</span>
            </span>
          </label>
          <div style="margin-top:8px; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; height: 400px;">
            <iframe src="equipment_rental_regulations_full.pdf" style="width:100%; height:100%; border:none;" title="利用規約">
              <p>PDFを表示できません。 <a href="equipment_rental_regulations_full.pdf" target="_blank" rel="noopener">こちらから利用規約をダウンロード</a>してご確認ください。</p>
            </iframe>
          </div>
        </div>

        <div class="row" style="margin-top:12px;justify-content:flex-end">
          <button class="btn btn-pri" id="btnRegister" disabled>登録する</button>
        </div>
      </form>
      <div id="msg" class="muted" style="margin-top:8px"></div>
    </div>
  </main>

  <script>
    // ==========================================
    // ★★★ GASウェブアプリのURLをここに設定 ★★★
    // ==========================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbykCzvGmlV5CRPrZwGREiLnT_PasBLsyXCQtTaWJu0zCUePpezN4QYaSVBUh1LNf-5nLw/exec"; 

    // 簡易パスワード強度判定
    function scorePassword(pw, email, sid){
      if(!pw) return {score:0, label:'弱い', cls:'weak', tips:'8文字以上にし，各種文字を混在させてください．'};
      let s = 0;
      const length = pw.length;
      const sets = [
        /[a-z]/.test(pw),
        /[A-Z]/.test(pw),
        /[0-9]/.test(pw),
        /[^A-Za-z0-9]/.test(pw),
      ].filter(Boolean).length;

      s += Math.min(4, sets) * 10;               // 種類
      s += Math.min(30, (length-8)*3);           // 長さボーナス
      if(!/(.)\1{2,}/.test(pw)) s += 10;         // 連続同一回避
      if(!/(?:012|123|234|345|456|567|678|789)/.test(pw)) s += 10; // 昇順連番回避

      const lowers = pw.toLowerCase();
      const bads = [email?.split('@')[0], sid].filter(Boolean);
      bads.forEach(b=>{ if(b && b.length>=3 && lowers.includes(String(b).toLowerCase())) s -= 20; });

      // よくある単語
      ['password','p@ssw0rd','qwerty','letmein','abc123'].forEach(w=>{ if(lowers.includes(w)) s -= 25; });

      s = Math.max(0, Math.min(100, s));
      const label = s>=70 ? '十分' : s>=45 ? 'ふつう' : '弱い';
      const cls = s>=70 ? 'good' : s>=45 ? 'fair' : 'weak';
      const tips = s>=70 ? '良好です．このまま登録できます．'
                  : s>=45 ? 'もう少し長くし，記号や大文字を追加するとより安全です．'
                          : '8文字以上，英大小・数字・記号の混在を推奨します（学籍番号や辞書語は避ける）．';
      return {score:s, label, cls, tips};
    }

    const els = {
      email: document.getElementById('regEmail'),
      sid: document.getElementById('regSID'),
      last: document.getElementById('regLast'),
      first: document.getElementById('regFirst'),
      dob: document.getElementById('regDOB'),
      grade: document.getElementById('regGrade'),
      pass: document.getElementById('regPass'),
      bar: document.getElementById('pwBar'),
      barInner: document.querySelector('#pwBar span'),
      tips: document.getElementById('pwTips'),
      terms: document.getElementById('termsCheck'),
      btn: document.getElementById('btnRegister'),
      msg: document.getElementById('msg'),
    };

    function reevaluate(){
      const {score, cls, tips} = scorePassword(els.pass.value, els.email.value, els.sid.value);
      els.bar.className = 'bar ' + cls;
      els.barInner.style.width = score + '%';
      els.tips.textContent = tips;
      const strongEnough = score >= 70 && els.pass.value.length >= 8;
      els.btn.disabled = !(strongEnough && els.terms.checked);
    }

    ['input','change'].forEach(ev=>{
      els.pass.addEventListener(ev, reevaluate);
      els.email.addEventListener(ev, reevaluate);
      els.sid.addEventListener(ev, reevaluate);
      els.terms.addEventListener(ev, reevaluate);
    });

    // 登録
    async function register(){
      els.btn.disabled = true;
      els.msg.textContent = '';
      try{
        const payload = {
          email: els.email.value.trim(),
          pass_user: els.pass.value, // GAS用プロパティ名に合わせる
          student_id: els.sid.value.trim(),
          last_name: els.last.value.trim(),
          first_name: els.first.value.trim(),
          dob: els.dob.value || null, // GAS用プロパティ名に合わせる
          grade: els.grade.value || null,
          role: '学生', // デフォルトを付与
        };
        // バリデーション（念押し）
        if(!els.terms.checked){ alert('利用規約に同意してください'); return; }
        const {score} = scorePassword(payload.pass_user, payload.email, payload.student_id);
        if(score < 70){ alert('パスワードが弱すぎます'); return; }

        // 管理者トークンがローカルストレージにあれば利用する (GASの仕様に依存)
        const token = localStorage.getItem('lab_server_admin_token') || '';
        
        // GAS対応のリクエスト構築
        const requestPayload = {
            _method: 'POST',
            _path: '/admin/users/register',
            token: token,
            ...payload
        };

        const r = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' }, // CORS回避
          body: JSON.stringify(requestPayload)
        });

        const ct = r.headers.get('content-type') || '';
        if(!r.ok){
          let msg = r.statusText; 
          try { const j = ct.includes('json') ? await r.json() : await r.text(); msg = j.detail || msg; } catch{}
          throw new Error(msg);
        }
        
        if (ct.includes('json')) {
            const data = await r.json();
            if (data && data.detail) throw new Error(data.detail);
        }

        els.msg.textContent = '登録しました．ログイン画面へ戻ってログインしてください．';
        els.msg.style.color = 'var(--ok)';
        
        // 入力フォームクリア
        els.email.value = ''; els.pass.value = ''; els.sid.value = ''; els.last.value = ''; els.first.value = '';
        els.terms.checked = false;
        
      }catch(e){
        els.msg.textContent = '登録に失敗しました：' + (e?.message || e);
        els.msg.style.color = '#b91c1c';
      }finally{
        reevaluate();
      }
    }
    document.getElementById('btnRegister').addEventListener('click', register);
    reevaluate();
  </script>

  <script>
  // 「ログインへ戻る」→ 常にオリジン直下 /index.html へ
  document.getElementById('linkBackToLogin')?.addEventListener('click', (ev) => {
    if (ev.button === 0 && !ev.ctrlKey && !ev.metaKey && !ev.shiftKey) {
      ev.preventDefault();
      location.href = new URL('/index.html', location.origin).href;
    }
  });
  </script>
</body>
</html>
